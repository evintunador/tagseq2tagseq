data:
  strategy: 'random'  # Options: random, random_walk, bfs, dfs
  layout_policy: 'bos_eos'  # null | bos_eos | identifier_prefix | identifier_prefix_bos_eos
  order_mode: 'prefer_targets_first'  # Options: as_traversed, prefer_targets_first
  doc_budget: null  # Optional per-document token limit (null = no limit)

model:
  compile: true
  compile_mode: 'default'
  mask_type: 'doc_causal'  # Options: doc_causal, causal, full, doc_bidirectional, cross_doc_link
  model_dim: 768  # Embedding dimension (GPT-2 small uses 768)
  num_layers: 12  # Number of transformer layers
  num_heads: 12  # Number of attention heads
  max_seq_len: 2048  # Maximum sequence length / context window
  dropout: 0.1
  drop_path_rate: 0.0
  fp8: false
  weight_tying: true  # Tie embedding and output weights
  ignore_index: -100
  dtype: 'bfloat16'

optimizer:
  type: 'muon'
  wd: 0.1
  momentum: 0.95   # Muon momentum
  beta1: 0.9        # AdamW beta1 (for embed/norm params)
  beta2: 0.95       # AdamW beta2
  muon_lr: 0.02     # LR for backbone 2-D weights (spectral-norm units)
  adamw_lr: 0.0003  # LR for embedding, norms, biases

train_loop:
  epochs: 1
  max_optimizer_steps: null   # Hard stop after N optimizer steps (null = no limit); micro-batches = this × accum_steps
  val_steps: 10               # Micro-batches to run per validation pass
  val_interval: 50            # Run validation every N optimizer steps
  atomic_feature_kwargs:
    # accum_steps: gradient accumulation steps before each optimizer update.
    # Also controls how often DDP NCCL all-reduce fires: only the last micro-batch
    # per optimizer step uses sync mode; the rest use no_sync (pure compute).
    # Perf context (2-node, 32k, cross_doc_link): backward variance across ranks
    # (some ranks get dense masks → slow FlexAttention backward) causes fast ranks
    # to stall at the NCCL barrier waiting for slow ranks. accum_steps > 1 amortises
    # that stall — e.g. accum_steps=4 means 3/4 micro-batches pay no NCCL cost at all.
    # Rule of thumb: accum_steps = 1 is fine for single-node; use 2–4 for multi-node
    # cross_doc_link runs at 32k to reduce stall overhead.
    accum_steps: 1

seed: 42
