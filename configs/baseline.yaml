data:
  strategy: 'random'  # Options: random, random_walk, bfs, dfs
  use_bos_eos: false
  order_mode: 'prefer_targets_first'  # Options: as_traversed, prefer_targets_first
  doc_budget: null  # Optional per-document token limit (null = no limit)

model:
  compile: true
  compile_mode: 'default'
  mask_type: 'doc_causal'  # Options: doc_causal, causal, full, doc_bidirectional, cross_doc_link
  model_dim: 768  # Embedding dimension (GPT-2 small uses 768)
  num_layers: 12  # Number of transformer layers
  num_heads: 12  # Number of attention heads
  max_seq_len: 2048  # Maximum sequence length / context window
  dropout: 0.1
  drop_path_rate: 0.0
  fp8: false
  weight_tying: true  # Tie embedding and output weights
  ignore_index: -100
  dtype: 'bfloat16'

optimizer:
  type: 'muon'
  wd: 0.1
  momentum: 0.95   # Muon momentum
  beta1: 0.9        # AdamW beta1 (for embed/norm params)
  beta2: 0.95       # AdamW beta2
  muon_lr: 0.02     # LR for backbone 2-D weights (spectral-norm units)
  adamw_lr: 0.0003  # LR for embedding, norms, biases

train_loop:
  epochs: 1
  max_steps: null   # Hard stop after N steps regardless of epochs (null = no limit)
  val_steps: 10     # Batches to run per validation pass
  val_interval: 50  # Run validation every N training steps
  atomic_feature_kwargs: {}  # Additional training loop arguments

seed: 42
